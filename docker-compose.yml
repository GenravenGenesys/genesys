services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: genesys-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    networks:
      - genesys-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: genesys-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - genesys-network

networks:
  genesys-network:
    driver: bridge
